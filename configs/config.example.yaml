# ============================================================
# EdgeTunnel BestSub 配置文件示例
# 复制为 configs/config.yaml 后再填写你的真实 Worker 信息。
# ============================================================

# ----------------------------------------------------------
# server: Web UI 服务配置
# ----------------------------------------------------------
server:
    # 本地 Web UI 监听地址（IP:端口）
    # 默认值: "127.0.0.1:8788"
    listen: "127.0.0.1:8788"

# ----------------------------------------------------------
# worker: EdgeTunnel Worker 连接配置
# ----------------------------------------------------------
worker:
    # EdgeTunnel Worker 地址，末尾不要带斜杠
    base_url: "https://your-worker.workers.dev"
    # Worker 管理员密码，用于登录 Worker 后台和推送 ADD.txt
    # 真实值只写入 configs/config.yaml，不要提交到版本控制
    password: "your_password"
    # 推送 ADD.txt 时使用的 User-Agent 头
    # 默认值: "bestsub-go/0.1"
    user_agent: "bestsub-go/0.1"

# ----------------------------------------------------------
# probe: IP 优选探测配置
# ----------------------------------------------------------
probe:
    # target: 探测目标配置
    target:
        # 探测模式。当前推荐 "worker"，按你的 Worker 域名做真实 HTTPS 访问探测
        mode: "worker"
        # 探测 URL，建议指向 Worker 下的轻量资源（如 robots.txt），减少流量消耗
        url: "https://your-worker.workers.dev/robots.txt"
        # HTTP 请求中的 Host 头，通常与 Worker 域名一致
        host: "your-worker.workers.dev"
        # TLS 握手时使用的 SNI（Server Name Indication），通常与 Host 一致
        sni: "your-worker.workers.dev"
        # HTTP 请求方法。HEAD 最轻量，不传输 body
        # 默认值: "HEAD"
        method: "HEAD"
        # 这些 HTTP 状态码会被视为探测成功（Worker 可能返回非 200 但仍表示可达）
        # 默认值: [200, 204, 301, 302, 403, 404]
        expected_status: [200, 204, 301, 302, 403, 404]

    # preflight: 测速前环境预检配置
    # 主要用于检测系统代理是否开启，避免代理干扰测速结果
    preflight:
        # 是否启用预检
        enabled: true
        # 跳过抽样低延迟探测，只检测系统代理是否开启
        # 设为 true 更适合日常使用，减少预检耗时
        disable_sample_probe: true
        # 抽样探测数量；仅在 disable_sample_probe 为 false 时生效
        # 从候选 IP 中随机抽取若干个做快速探测，判断延迟是否异常
        # 默认值: 8
        sample_size: 8
        # 检测到异常低延迟时是否阻止测速继续执行
        # 异常低延迟通常意味着流量经过了本地代理
        block_on_low_latency: true
        # 异常低延迟阈值，单位毫秒
        # 低于此值的延迟会被判定为异常（正常跨境延迟不可能这么低）
        # 默认值: 20
        low_latency_threshold_ms: 20

    # 是否启用 IPv4 探测
    ipv4: true
    # 是否启用 IPv6 探测
    ipv6: false

    # 国家/地区过滤（ISO 3166-1 alpha-2 代码，如 "JP", "US", "HK"）
    # 留空表示不过滤，接受所有地区的 IP
    # 也可以在 Web UI 中选择后自动保存到此处
    countries: []
    
    # 是否强制验证 IP 在 GeoIP 数据库中的注册归属地
    # 默认关闭：Cloudflare Anycast 的注册地和实际访问机房经常不一致，
    # 关闭后不需要 GeoLite2-Country.mmdb 文件。
    # 如需开启，请自行下载 MaxMind GeoLite2 Country 数据库并放到 geoip_db_path 指定位置。
    require_geoip_match: false
    # GeoLite2 Country 数据库文件路径（相对路径或绝对路径）
    # 仅在 require_geoip_match 为 true 时需要
    geoip_db_path: ""

    # Cloudflare 支持的 HTTPS 端口列表
    # 对于没有指定端口的 IP/CIDR，会在这些端口中随机选择进行探测
    # 默认值: [443, 2053, 2083, 2087, 2096, 8443]
    ports: [443, 2053, 2083, 2087, 2096, 8443]

    # 从 sources 中加载的候选 IP 数量上限
    # 候选数量越大，覆盖面越广但耗时越长
    # 稳定模式会在运行时自动放大该值
    # 默认值: 600
    candidate_limit: 600
    # 最终保留的优选 IP 数量（写入 ADD.txt 的条目数）
    # 默认值: 30
    keep: 30
    # 单个 IP 探测超时时间，单位毫秒
    # 超过此时间未响应则判定为失败
    # 默认值: 2500
    timeout_ms: 2500
    # 并发探测数量（同时发起的连接数）
    # 值越大速度越快，但对网络和系统资源要求越高
    # 默认值: 120
    concurrency: 120
    # 每个 IPv4 /24 子网最多保留的结果数量
    # 避免结果集中在同一网段，提高多样性
    # 默认值: 2
    per_cidr24_limit: 2

# ----------------------------------------------------------
# sources: IP 候选源配置
# 支持 "remote"（远程 URL）和 "file"（本地文件）两种类型
# weight: 权重值，数值越高在候选排序中优先级越高
# ----------------------------------------------------------
sources:
    # 远程源：Cloudflare 官方 IPv4 地址段（稳定性最好，直连基本不会挂）
    - type: "remote"
      name: "cf-ipv4"
      url: "https://www.cloudflare.com/ips-v4"
      path: ""
      weight: 130

    # 远程源：cmliu 维护的 Cloudflare CIDR 列表
    - type: "remote"
      name: "cmliu-cf-cidr"
      url: "https://raw.githubusercontent.com/cmliu/cmliu/main/CF-CIDR.txt"
      path: ""
      weight: 120

    # 远程源：XIU2 CloudflareSpeedTest 项目的 IPv4 列表
    - type: "remote"
      name: "xiu2-ipv4"
      url: "https://raw.githubusercontent.com/XIU2/CloudflareSpeedTest/master/ip.txt"
      path: ""
      weight: 100

    # 远程源：Cloudflare 官方 IPv6 地址段
    - type: "remote"
      name: "cf-ipv6"
      url: "https://www.cloudflare.com/ips-v6"
      path: ""
      weight: 80

    # 本地文件源：自定义种子 IP 列表
    # 支持格式：纯 IP、IP:端口、CIDR 段，每行一个
    # 可用 # 号添加备注，如 1.2.3.4#我的IP
    - type: "file"
      name: "local-seeds"
      url: ""
      path: "seeds.txt"
      weight: 200

# ----------------------------------------------------------
# output: 测速结果输出配置
# ----------------------------------------------------------
output:
    # 测速结果输出文件路径（相对路径或绝对路径）
    # 默认值: "ADD.txt"
    path: "ADD.txt"
    # ADD.txt 每行备注前缀，最终格式为: IP:端口#前缀-序号
    # 默认值: "IP 官方优选"
    remark_prefix: "IP 官方优选"
    # 设为 true 时只生成 ADD.txt 但不推送到 Worker
    # 适合调试或仅需本地使用的场景
    dry_run: false

# ----------------------------------------------------------
# clash: Clash 配置生成相关设置
# 用于将优选结果自动生成 Clash Verge Rev 可用的本地配置文件
# ----------------------------------------------------------
clash:
    # Clash Verge Rev 的 profiles 目录路径
    # 留空时前端"生成本地 Clash 配置"按钮会禁用
    # ⚠️ 注意：YAML 双引号中反斜杠 \ 会被当作转义符（如 \U 会报错 "did not find expected hexdecimal number"）
    #    请使用正斜杠 / 代替，Go 在 Windows 上两种斜杠都能识别。
    # Windows 示例: "C:/Users/你的用户名/AppData/Roaming/io.github.clash-verge-rev.clash-verge-rev/"
    local_profile_dir: ""
    # 写入 profiles 目录的文件名
    # 默认值: "bestsub-local.yaml"
    filename: "bestsub-local.yaml"
    # 生成后是否自动把该 YAML 注册到 Clash Verge 的 profiles.yaml
    # 注意：只注册不会自动切换为当前使用的配置（不修改 current）
    auto_register: true
    # 注册到 Clash Verge 时使用的 profile UID（唯一标识）
    # 默认值: "bestsub-local"
    profile_uid: "bestsub-local"
    # 注册到 Clash Verge 时显示的配置名称
    # 默认值: "BestSub 本地优选"
    profile_name: "BestSub 本地优选"
    # 订阅名称，仅用于标识和日志输出
    # 默认值: "edgetunnel"
    subscription_name: "edgetunnel"

    # --- 节点连接参数 ---
    # 节点连接使用的域名（通常与 Worker 域名一致）
    # 留空时自动使用 probe.target.host 的值
    host: "your-worker.workers.dev"
    # VLESS 节点的 UUID
    uuid: "your_uuid"
    # WebSocket 路径
    # 默认值: "/"
    path: "/"
    # 节点协议类型
    # 默认值: "vless"
    node_type: "vless"
    # 传输层协议
    # 默认值: "ws"
    network: "ws"
    # TLS 客户端指纹模拟
    # 默认值: "chrome"
    fingerprint: "chrome"

    # --- 代理组测速参数 ---
    # Clash 代理组自动测速使用的 URL
    # gstatic generate_204 对 Clash url-test 更稳定
    # 默认值: "http://www.gstatic.com/generate_204"
    test_url: "http://www.gstatic.com/generate_204"
    # 自动测速间隔，单位秒
    # 默认值: 300
    interval: 300
    # url-test 容差值，单位毫秒
    # 延迟差异在此范围内不会触发节点切换
    # 默认值: 50
    tolerance: 50

    # --- ProxyIP 配置 ---
    # 手动指定的反代 IP（proxyip）
    # 生成 WS path 时会附加 /proxyip=xxx 参数
    # 留空则不追加 proxyip 参数
    proxyip: ""
    
    # proxyip_auto: 自动获取并测速优选反代 IP
    # 从公共列表拉取指定国家的反代 IP，经过延迟测试后选出最优的拼接到配置中
    proxyip_auto:
        # 是否启用自动反代 IP 优选
        enabled: true
        # 目标国家代码（ISO 3166-1 alpha-2，单选）
        # 例如: "JP"（日本）, "US"（美国）, "HK"（香港）, "SG"（新加坡）
        country: "JP"
        # 最多保留几个可用的反代 IP 拼接到 Clash 配置中
        # 每个反代 IP 会生成一组独立的节点
        # 默认值: 8
        limit: 8
        # 反代 IP 列表源 URL
        # 格式要求：每行 IP:端口#国家代码
        # 默认值: "https://zip.cm.edu.kg/all.txt"
        source_url: "https://zip.cm.edu.kg/all.txt"
        # 延迟检测 API 地址，%s 会被替换为候选 IP
        # 需要返回 JSON: {"success": true/false, "responseTime": 123}
        # 默认值: "https://api.090227.xyz/check?proxyip=%s"
        check_api: "https://api.090227.xyz/check?proxyip=%s"
        # 延迟检测并发数量
        # 默认值: 20
        concurrency: 20
        # 是否要求反代 IP 的 GeoIP 注册地与目标国家一致
        # 与 probe.require_geoip_match 类似，关闭可提高命中率
        require_geoip_match: false
        # GeoIP 数据库路径（仅 require_geoip_match 为 true 时需要）
        # 留空时自动使用 probe.geoip_db_path 的值
        geoip_db_path: "GeoLite2-Country.mmdb"
        # worker_verify: 通过 Worker 实际发起请求验证反代 IP 的出口国家
        # 比 GeoIP 数据库更准确，但需要 Worker 支持 /admin/proxyip-test 接口
        worker_verify:
            # 是否启用 Worker 出口验证
            enabled: false
            # Worker 验证时访问的目标 URL，用于获取出口 IP 信息
            # 默认值: "https://cloudflare.com/cdn-cgi/trace"
            url: "https://cloudflare.com/cdn-cgi/trace"
            # 最多检查多少个候选反代 IP（避免大量请求耗时过长）
            # 默认值: limit * 3
            max_checks: 24

    # --- 高级连接参数 ---
    # WebSocket 0-RTT Early Data 大小，单位字节
    # 用于减少握手延迟，0 表示禁用
    # 推荐值: 2560
    early_data: 2560
    # 是否为每个节点生成随机化的 WS path 前缀
    # 开启后可降低被识别和封锁的概率
    random_path: true
    # 是否启用 ECH（Encrypted Client Hello）
    # ECH 可以加密 TLS 握手中的 SNI，提高隐私性
    ech: true
    # ECH 查询使用的 SNI 域名
    # 默认值: "cloudflare-ech.com"
    ech_sni: "cloudflare-ech.com"
    # 是否跳过 TLS 证书验证
    # 生产环境建议保持 false
    skip_cert_verify: false
